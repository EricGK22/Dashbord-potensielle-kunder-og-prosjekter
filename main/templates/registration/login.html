<!DOCTYPE html>
<html lang="no">
<head><meta charset="utf-8"><title>Logg inn</title></head>
<body>
  <h1>Logg inn</h1>
  {% if form.errors %}<p>Feil brukernavn eller passord.</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Logg inn</button>
  </form>
</body>
</html>
