<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logg inn</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 100%);
        }
        .boks {
            background: #fff; border-radius: 14px; padding: 36px 32px;
            width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,.35);
        }
        .boks h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
        .boks p.under { margin: 0 0 24px; color: #6b7280; font-size: 14px; }
        label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase;
                letter-spacing: .04em; color: #6b7280; margin: 14px 0 6px; }
        input {
            width: 100%; padding: 11px 12px; border: 1px solid #d1d5db;
            border-radius: 8px; font-size: 15px;
        }
        input:focus { outline: 2px solid #bfdbfe; border-color: #2563eb; }
        button {
            width: 100%; margin-top: 22px; padding: 12px;
            background: #2563eb; color: #fff; font-size: 15px; font-weight: 600;
            border: none; border-radius: 8px; cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        .feil {
            background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
            border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="boks">
        <h1>Prosjektdashbord</h1>
        <p class="under">Logg inn for &aring; se signalposter og kommentarer.</p>

        {% if form.errors %}
            <div class="feil">Feil brukernavn eller passord. Pr&oslash;v igjen.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="id_username">Brukernavn</label>
            <input type="text" name="username" id="id_username" autofocus autocomplete="username" required>

            <label for="id_password">Passord</label>
            <input type="password" name="password" id="id_password" autocomplete="current-password" required>

            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit">Logg inn</button>
        </form>
    </div>
</body>
</html>
